# =============================================================
# TripAny White-Label — Nginx Config (for VPS)
# =============================================================

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL — edit paths for your certificates
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/tripany;
    index index.html index.php;

    # Gzip
    gzip on;
    gzip_types text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    ## ── Node.js API (recommended) ──
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    ## ── PHP API (alternative) ──
    # location /api/ {
    #     rewrite ^/api/(.*)$ /vehigo-php/api/index.php?action=$1 last;
    # }

    ## ── Mobile App PWA ──
    location / {
        try_files $uri $uri/ /vehigo-php/mobile/index.html;
    }

    ## ── Admin Panel SPA ──
    location /admin {
        try_files $uri $uri/ /admin/index.html;
    }

    ## ── Static assets ──
    location /assets/ {
        alias /var/www/tripany/vehigo-php/mobile/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /uploads/ {
        alias /var/www/tripany/vehigo-php/uploads/;
        expires 7d;
    }

    ## ── PWA files ──
    location = /manifest.json {
        alias /var/www/tripany/vehigo-php/mobile/manifest.json;
        expires 1y;
    }

    location = /sw.js {
        alias /var/www/tripany/vehigo-php/mobile/sw.js;
        expires 0;
        add_header Cache-Control "no-cache";
    }

    ## ── PHP processing (if using PHP backend) ──
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    ## ── Security ──
    location ~ /\. {
        deny all;
    }

    location ~ (brand\.config|\.env|\.sql|\.md)$ {
        deny all;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
